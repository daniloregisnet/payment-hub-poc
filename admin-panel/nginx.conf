server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://host.docker.internal:8090;
        proxy_set_header Host $host;
        # nginx usa HTTP/1.0 pro upstream por padrão — o Envoy do istio-ingressgateway
        # exige 1.1 e responde 426 Upgrade Required sem isso.
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # Cenários usam Server-Sent Events — sem isso o nginx acumula tudo e só entrega o log
        # no final, matando o efeito de "tempo real" no painel.
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 90s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
