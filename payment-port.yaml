# payment-port — ponto de entrada/orquestrador dos 5 cenários de demonstração, consumido pelo
# painel Angular. Roda com a MESMA ServiceAccount do payment-queue de propósito: assim a
# chamada dele pra payment-db reproduz fielmente o 403 que o payment-queue real levaria (ver
# AuthorizationPolicy payment-queue-deny-db / payment-db-authz em istio-config.yaml) — sem
# precisar de kubectl exec dentro do pod real.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-port
  namespace: payment-hub
  labels:
    app: payment-port
    tier: control-plane-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-port
  template:
    metadata:
      labels:
        app: payment-port
        tier: control-plane-demo
    spec:
      serviceAccountName: payment-queue
      containers:
        - name: payment-port
          image: payment-port:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8004
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: payment-port
  namespace: payment-hub
  labels:
    app: payment-port
    tier: control-plane-demo
spec:
  selector:
    app: payment-port
  ports:
    - name: http
      port: 80
      targetPort: 8004
