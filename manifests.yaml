# Payment Hub — Deployments + Services (namespace payment-hub, Istio Ambient Mode)
#
# ServiceAccount dedicada só para payment-queue: as AuthorizationPolicy em
# istio-config.yaml usam identidade (SPIFFE principal) pra distinguir "payment-queue" dos
# demais — sem isso todo mundo compartilharia a SA "default" e a regra de DENY não teria como
# diferenciar quem está chamando. api/cache/db ficam na SA "default" mesmo (as regras de ALLOW
# do guia são propositalmente genéricas pra "default service account").
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payment-queue
  namespace: payment-hub
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-api
  namespace: payment-hub
  labels:
    app: payment-api
    tier: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-api
  template:
    metadata:
      labels:
        app: payment-api
        tier: gateway
    spec:
      containers:
        - name: payment-api
          image: payment-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: payment-api
  namespace: payment-hub
  labels:
    app: payment-api
    tier: gateway
spec:
  selector:
    app: payment-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-cache
  namespace: payment-hub
  labels:
    app: payment-cache
    tier: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-cache
  template:
    metadata:
      labels:
        app: payment-cache
        tier: cache
    spec:
      containers:
        - name: payment-cache
          image: payment-cache:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: payment-cache
  namespace: payment-hub
  labels:
    app: payment-cache
    tier: cache
spec:
  selector:
    app: payment-cache
  ports:
    - name: http
      port: 80
      targetPort: 8001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-db
  namespace: payment-hub
  labels:
    app: payment-db
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-db
  template:
    metadata:
      labels:
        app: payment-db
        tier: database
    spec:
      containers:
        - name: payment-db
          image: payment-db:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8002
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: payment-db
  namespace: payment-hub
  labels:
    app: payment-db
    tier: database
spec:
  selector:
    app: payment-db
  ports:
    - name: http
      port: 80
      targetPort: 8002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-queue
  namespace: payment-hub
  labels:
    app: payment-queue
    tier: queue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-queue
  template:
    metadata:
      labels:
        app: payment-queue
        tier: queue
    spec:
      serviceAccountName: payment-queue
      containers:
        - name: payment-queue
          image: payment-queue:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8003
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: payment-queue
  namespace: payment-hub
  labels:
    app: payment-queue
    tier: queue
spec:
  selector:
    app: payment-queue
  ports:
    - name: http
      port: 80
      targetPort: 8003
